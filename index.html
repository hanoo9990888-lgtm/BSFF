<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Dear Sun</title>
    <meta name="language" content="en-US">
    <meta name="title" content="Dear Sun">
    <meta name="description" content="My favorite friend forever">
    <link rel="icon" type="image/x-icon" href="https://cdn.jsdelivr.net/gh/sun0225SUN/photos/img/20210715233345.png">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <audio id="audios" preload="auto" loop>
        <source src="1.mp3" type="audio/mpeg">
    </audio>

    <!-- Start overlay — fixes browser autoplay block -->
    <div id="startOverlay" class="start-overlay">
        <div class="start-btn">💕 Click to Start 💕</div>
    </div>

    <div class="container" onselectstart="return false;" unselectable="on" style="-moz-user-select:none;">

        <div class="body_left">
            <img src="biubiubiu.gif" alt="" ondragstart="return false;">
        </div>

        <div class="body_center love">
            <div class="block">
                <div class="div1"></div>
                <div class="div2"></div>
                <div class="div3"></div>
                <div class="div4"></div>
            </div>
        </div>

    </div>

    <!-- Message shown when heart rises -->
    <div id="messageText" class="message-text">My Favorite Friend Forever 💕</div>

    <div class="footer" id="footer">
        <div class="border">
            <div class="border-top"></div>
            <div class="border-bottom"></div>
        </div>
    </div>

    <script type="text/javascript" src="script.js"></script>

</body>

</html>
